<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Straight Line System — Live Call Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--card:#141414;--card-cur:#0f1929;--border:#2a2a2a;--border-cur:#1d4ed8;
  --text:#f1f5f9;--muted:#8b95a3;--dim:#4b5563;--faint:#1c1c1c;
  --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
  --green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--purple:#a855f7;
  --ui:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'Courier New',Courier,monospace;

  /* ── Tonality palette — distinct from response colors ── */
  --tone-assertive: #60a5fa;   /* sky blue  — steps 1, 5, 6  */
  --tone-curious:   #67e8f9;   /* cyan      — step 2         */
  --tone-concerned: #fb7185;   /* rose      — steps 3, 7, 10, 11 */
  --tone-neutral:   #94a3b8;   /* slate     — steps 4, 12    */
  --tone-upbeat:    #818cf8;   /* indigo    — steps 8, 9     */
}
body{background:var(--bg);color:var(--text);font-family:var(--ui);min-height:100vh;font-size:14px;}

/* ── Header ── */
#hdr{position:sticky;top:0;z-index:200;background:rgba(6,6,6,0.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:20px;}
#logo{font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--amber);}
#hstats{display:flex;gap:24px;margin-left:auto;align-items:center;}
.hstat{text-align:right;}
.hstat-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);display:block;margin-bottom:1px;}
.hstat-val{font-size:16px;font-weight:600;line-height:1;}
#htimer{font-family:var(--mono);}
#hnew{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--ui);transition:all .2s;}
#hnew:hover{border-color:var(--amber);color:var(--amber);}

/* ── Progress ── */
#prog-wrap{height:2px;background:var(--border);}
#prog-bar{height:2px;background:var(--amber);transition:width .4s ease;width:8.33%;}

/* ── Layout ── */
#main{max-width:900px;margin:0 auto;padding:20px 16px 80px;}

/* ── Step Cards ── */
.sc{
  background:var(--card);
  border:1px solid var(--border);
  border-left-width:4px;        /* tonality border — color set inline */
  border-radius:10px;
  margin-bottom:10px;
  overflow:hidden;
  transition:border-color .2s,background .2s,opacity .2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
.sc.cur{border-color:var(--border-cur);border-left-color:inherit;background:var(--card-cur);box-shadow:0 4px 20px rgba(0,0,0,0.7);}
/* cur overrides the right/top/bottom to blue but we preserve left via JS inline style */
.sc.done{opacity:0.35;}
.sc.done:hover{opacity:0.6;}

/* ── Step Header ── */
.sh{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;user-select:none;}
.sh:hover{background:rgba(255,255,255,0.04);}
.snum{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--dim);min-width:32px;line-height:1;letter-spacing:-0.02em;}
.sc.cur .snum{color:var(--amber);}
.sc.done .snum{color:var(--green);font-size:18px;}
.smeta{flex:1;min-width:0;}
.sname{font-size:14px;font-weight:600;margin-bottom:3px;}
.smeta-bottom{display:flex;align-items:center;gap:8px;}
.ssub{font-size:11px;color:var(--muted);line-height:1.3;}
/* tone word on collapsed card */
.stone-tag{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;opacity:0.75;white-space:nowrap;}
.sdots{display:flex;gap:5px;flex-shrink:0;}
.dot{width:8px;height:8px;border-radius:50%;opacity:0.18;}
.dot.hit{opacity:1;}
.chev{color:var(--dim);font-size:11px;transition:transform .2s;flex-shrink:0;}
.sc.open .chev{transform:rotate(180deg);}

/* ── Step Body ── */
.sbody{display:none;padding:0 18px 18px;}
.sc.open .sbody{display:block;}

/* ── Tonality block — top of expanded card ── */
.tblock{
  border-left:3px solid;
  border-radius:0 6px 6px 0;
  padding:10px 14px;
  margin-bottom:16px;
  background:rgba(255,255,255,0.025);
}
.tblock-primary{font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:4px;}
.tblock-cue{font-size:12px;color:var(--text);line-height:1.5;margin-bottom:3px;}
.tblock-avoid{font-size:11px;color:var(--muted);line-height:1.4;}
.tblock-avoid::before{content:'Avoid: ';font-weight:600;}

/* ── Items list ── */
.items-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
.igroup{font-size:9.5px;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);font-weight:700;margin:10px 0 2px;padding-left:2px;}
.igroup:first-child{margin-top:0;}
.item{padding:10px 15px;font-size:13.5px;line-height:1.55;background:#1c1c1c;border:1px solid #303030;color:var(--text);cursor:default;}
.item-q{border-radius:22px;}
.item-s{border-radius:4px;color:#c9d1d9;}

/* ── Color Buttons ── */
.crow{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:10px;}
.cbtn{border:2px solid transparent;border-radius:7px;padding:10px 4px;cursor:pointer;text-align:center;transition:transform .1s;}
.cbtn:active{transform:scale(0.96);}
.cbtn.sel{border-color:currentColor;}
.clabel{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;}
.cword{display:block;font-size:9.5px;opacity:0.65;margin-top:2px;font-style:italic;line-height:1.3;}

/* ── Handler ── */
.hbox{border-left:3px solid;border-radius:0 6px 6px 0;padding:14px 16px;font-size:13.5px;line-height:1.75;margin:8px 0 14px;background:rgba(255,255,255,0.025);}
.hacts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.abtn{background:none;border:1px solid;border-radius:5px;padding:6px 13px;font-size:12px;cursor:pointer;font-family:var(--ui);transition:background .15s;}
.abtn:hover{background:rgba(255,255,255,0.06);}
.abtn.loop{border-color:var(--orange);color:var(--orange);}
.abtn.adv{border-color:var(--green);color:var(--green);}
.abtn.done-btn{border-color:var(--amber);color:var(--amber);}

/* ── Nav bar ── */
.nbar{display:flex;gap:8px;padding-top:14px;border-top:1px solid var(--border);align-items:center;margin-top:4px;}
.nbtn{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--ui);transition:all .15s;}
.nbtn:hover{border-color:var(--text);color:var(--text);}
.nbtn.prime{border-color:var(--amber);color:var(--amber);}
.nbtn.prime:hover{background:var(--amber);color:#000;}

/* ── Session Log ── */
#log-wrap{margin-top:32px;border-top:1px solid var(--border);padding-top:20px;}
#log-wrap h3{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:12px;}
#log-list{display:flex;flex-direction:column;gap:6px;}
.log-item{background:var(--faint);border-radius:6px;padding:8px 12px;font-size:12px;display:flex;align-items:center;gap:10px;}
.log-step{color:var(--amber);font-family:var(--mono);font-weight:700;min-width:24px;}
.log-color{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.log-name{color:var(--muted);}
.log-outcome{color:var(--text);margin-left:auto;}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">⬡ Straight Line System</div>
  <div id="hstats">
    <div class="hstat">
      <span class="hstat-label">Step</span>
      <span class="hstat-val" id="hstep">1 / 12</span>
    </div>
    <div class="hstat">
      <span class="hstat-label">Elapsed</span>
      <span class="hstat-val" id="htimer">0:00</span>
    </div>
    <button id="hnew" onclick="newSession()">↺ New Call</button>
  </div>
</div>
<div id="prog-wrap"><div id="prog-bar"></div></div>

<div id="main">
  <div id="slist"></div>
  <div id="log-wrap" style="display:none;">
    <h3>Session Log — Color Responses</h3>
    <div id="log-list"></div>
  </div>
</div>

<script>
// ── Response colors ──
const CM={
  g:{l:'HOT',   bg:'rgba(34,197,94,0.13)', cl:'#4ade80', bc:'#22c55e'},
  y:{l:'WARM',  bg:'rgba(234,179,8,0.13)', cl:'#facc15', bc:'#eab308'},
  o:{l:'FENCE', bg:'rgba(249,115,22,0.13)',cl:'#fb923c', bc:'#f97316'},
  r:{l:'COLD',  bg:'rgba(239,68,68,0.13)', cl:'#f87171', bc:'#ef4444'},
  p:{l:'CLOSED',bg:'rgba(168,85,247,0.13)',cl:'#c084fc', bc:'#a855f7'}
};
const CKS=['g','y','o','r','p'];

// ── Tonality families ──
// Distinct from response colors — these are internal states, not prospect signals
const TM={
  assertive: { color:'#60a5fa', label:'Assertive' },
  curious:   { color:'#67e8f9', label:'Curious'   },
  concerned: { color:'#fb7185', label:'Concerned' },
  neutral:   { color:'#94a3b8', label:'Neutral'   },
  upbeat:    { color:'#818cf8', label:'Upbeat'    },
};

// S = [id, name, subtitle, items, responses, tone]
// items: { type: 'q'|'s'|'group', text }
// q = question (rounded), s = statement (square), group = label only
const S=[

[1,'Immediate Control','Seize the frame — own every second from hello',
[
  {type:'q', text:'"Hi, [Name]?"'},
  {type:'q', text:'"Hey [Name], it\'s Conrad — how are we doing today?"'},
  {type:'q', text:'"Is now still a good time to look into your mortgage protection options?"'},
  {type:'group', text:'Who I Am'},
  {type:'s', text:'"My job is simple — I\'m a medical field underwriter in the state of [STATE]."'},
  {type:'s', text:'"I have a database showing every insurance company you\'re medically eligible for."'},
  {type:'s', text:'"It\'s all based on your age, health, and habits."'},
],
{g:[`"Not at all, go ahead"`,
    `Perfect. Lock the frame immediately.\n\n"Great — I'll be quick. The reason I'm reaching out specifically to you today is [VALUE HOOK]..." → Advance to Step 2.`,
    null],
 y:[`"Sure, what's this about"`,
    `Acknowledge + hook.\n\n"I appreciate it — the reason I'm reaching out is [VALUE HOOK]. I'll be brief." → Advance to Step 2.`,
    null],
 o:[`"Kind of busy right now"`,
    `Reduce pressure, buy goodwill.\n\n"Completely understand — I only need 90 seconds. [One-sentence value prop]. Worth it?"\n\nYes → Step 2. No → "Totally — when's a better time?" → schedule callback.`,
    1],
 r:[`"Not really interested"`,
    `Don't flinch. Redirect.\n\n"Fair — most people say that before they hear what I'm actually calling about. One quick question before I let you go?"\n\nGet ONE answer → that's your bridge to Step 2.`,
    1],
 p:[`"Remove me from your list"`,
    `Absolute respect — plant a seed.\n\n"Absolutely, I'll take care of that right now. Before I do — is it the timing, or is this genuinely off the table for you right now?"\n\nIf they answer → re-engage. If they hang up → move on.`,
    null]},
{family:'assertive', cue:'You are the expert. You have something they need. Own the call from the first word.', avoid:"Never sound like you're asking permission to talk."}],

[2,'Gather Intelligence','Listen 80%, talk 20% — find the pain, the goal, the gap',
[
  {type:'group', text:'Mortgage'},
  {type:'q', text:'"How much debt do you currently have on this property?"'},
  {type:'q', text:'"Who will be responsible for taking on this debt when you pass away?"'},
  {type:'q', text:'"What\'s your monthly mortgage payment — including taxes and insurance?"'},
  {type:'q', text:'"How many years left on the loan?"'},
  {type:'q', text:'"If you sold today, about how much would you get?"'},
  {type:'s', text:'Equity = sale price − remaining debt. Use this number as leverage.'},
  {type:'group', text:'Health'},
  {type:'q', text:'"Do you smoke or use any tobacco products?"'},
  {type:'q', text:'"Any medical conditions or prescriptions at all?"'},
  {type:'q', text:'"Any history of heart attack, stroke, cancer, or diabetes?"'},
  {type:'q', text:'"High blood pressure or high cholesterol? Controlled? How many meds?"'},
  {type:'q', text:'"Any surgeries or hospitalizations in the last 5 years?"'},
  {type:'group', text:'Finances'},
  {type:'q', text:'"Still working, or fully retired?"'},
  {type:'q', text:'"Any dependents living in the home?"'},
  {type:'q', text:'"About how much do you bring home per month — just a rough ballpark?"'},
  {type:'group', text:'Existing Coverage'},
  {type:'q', text:'"Do you have any existing whole life or term life insurance?"'},
  {type:'q', text:'"How much coverage, with what company, and what are you paying per month?"'},
],
{g:[`Opens up, shares freely`,
    `Affirm and dig deeper.\n\n"That's really helpful. So from what I'm hearing — [paraphrase]. Is that a fair summary?"\n\nBuild on this foundation → Step 3.`,
    null],
 y:[`Answers briefly, guarded`,
    `Specific follow-up.\n\n"Got it. And just to dig a bit deeper — [specific follow-up Q]. Because that's actually very relevant to what I want to share with you."\n\nStay on Step 2 until you have the full picture.`,
    2],
 o:[`Vague, noncommittal`,
    `Reframe the question.\n\n"Let me ask it differently — if you could change ONE thing about how you're currently handling [area], what would it be?"\n\nGet them talking.`,
    2],
 r:[`"Why do you need to know that"`,
    `Explain your role.\n\n"Fair question. I only ask because the companies I can access are completely different depending on your situation. I don't want to show you something that's not a fit. Just one thing: [single key Q]?"`,
    2],
 p:[`"Just tell me what you're selling"`,
    `One critical question, then proceed.\n\n"Absolutely — getting there. Just one thing first so I can make this relevant: [most critical Q]?"\n\nUse their answer as a bridge. Skip to Step 5 if they refuse to engage further.`,
    null]},
{family:'curious', cue:"You're a doctor gathering symptoms — genuinely interested in their specific situation.", avoid:"Don't rush through questions. Every answer is leverage you'll use in the pitch."}],

[3,'Develop Rapport','Make them feel heard — mirror, match, find the connection',
[
  {type:'s', text:'"That makes total sense."'},
  {type:'s', text:'"I work with a lot of people in your exact situation."'},
  {type:'q', text:'"Does that sound familiar?"'},
  {type:'q', text:'"And [BENEFICIARY] — what\'s [his/her] plan for that [PAYMENT] on the 1st of the month?"'},
  {type:'q', text:'"You\'ve got [EQUITY] built up in that home. What happens to that if the mortgage doesn\'t get paid?"'},
  {type:'s', text:'"The bank doesn\'t stop. 90 days late — they foreclose. [BENEFICIARY] loses the home and the equity."'},
  {type:'s', text:'"We\'re not here to sell something. We\'re here to make sure [BENEFICIARY] has a plan."'},
],
{g:[`"Exactly, that's us"`,
    `Deepen it.\n\n"Right — and that's really who we're doing this for. [BENEFICIARY]'s name on that policy is the whole point." → Step 4.`,
    null],
 y:[`"Sort of, kind of"`,
    `Explore the nuance.\n\n"Tell me more — what does it look like for you specifically?"\n\nBuild the connection before advancing. Stay here until you feel genuine rapport.`,
    3],
 o:[`Polite but distant`,
    `Make the equity number real.\n\n"Let me put it this way — [EQUITY] is a real number. That's what you've built. The bank takes their cut first if the mortgage doesn't get paid. [BENEFICIARY] could lose the home and lose that equity too."`,
    3],
 r:[`"Can we just get to the point"`,
    `Respect and speed up.\n\n"Absolutely. Here's the honest version: [one crisp sentence connecting their situation to your solution]."\n\nLogical buyer — skip to Step 4.`,
    null],
 p:[`Cold, giving nothing`,
    `Direct value hook.\n\n"Look — I get it. Here's 20 seconds: [What you do, who it's for, what changes for them]. Worth 60 more seconds?"\n\nStep 4 if yes. Close the call gracefully if no.`,
    null]},
{family:'concerned', cue:'You actually care what happens to their family. Let that be real — not performed.', avoid:"Don't fake warmth. Use their name and reference exactly what they told you."}],

[4,'Transition','Bridge from their world to your solution — get the micro-yes',
[
  {type:'s', text:'"So what I\'ll do is run through some questions about the mortgage — just so we know what we\'re solving for."'},
  {type:'s', text:'"From there, we\'ll look at your health and habits to see what you\'re medically eligible for."'},
  {type:'s', text:'"Then we\'ll talk about the budget — just to make sure this is long-term affordable."'},
  {type:'s', text:'"And if we find something that works, the biggest thing we can do today is submit an application — just to see if they\'d approve you."'},
  {type:'q', text:'"Does that sound fair?"'},
],
{g:[`"Yeah, absolutely"`,
    `Roll directly into Step 5. You have their permission. Lead strong.`,
    null],
 y:[`"What exactly is it"`,
    `Brief category framing.\n\n"It's essentially [one-sentence category]. Let me give you the quick version and you tell me if it's worth exploring further — fair?" → Step 5.`,
    null],
 o:[`"How long will this take"`,
    `Time commitment.\n\n"Honestly, five minutes. If it's not a fit, I'll tell you — I'm not going to waste your time." → Step 5.`,
    4],
 r:[`"I really don't have time"`,
    `Compressed offer.\n\n"Give me literally 90 seconds — headline version. If it grabs you, we talk more. If not, I'll let you go. Deal?" → Compressed Step 5.`,
    4],
 p:[`"Just send me an email"`,
    `Address it directly.\n\n"I will — and I want to. But what I'm about to share makes a lot more sense in two minutes than any email can. Can I just cover the key points?"\n\nYes → Step 5. No → get their email + schedule a call.`,
    null]},
{family:'neutral', cue:'This is just what happens next. Smooth, frictionless, obvious.', avoid:'No extra energy. Calm transitions close more than enthusiastic ones.'}],

[5,'Give Presentation','Logic first, emotion second, certainty of company third',
[
  {type:'group', text:'Company'},
  {type:'s', text:'"The most affordable company the system is recommending is [CARRIER]."'},
  {type:'q', text:'"Are you familiar with [CARRIER]?"'},
  {type:'s', text:'"A-rated company. Been around for over 100 years."'},
  {type:'s', text:'"They pay out to [BENEFICIARY] within 7 business days of a claim. Every time."'},
  {type:'group', text:'Benefits'},
  {type:'s', text:'"Level and immediate — rates never go up, coverage never goes down, effective day one. No waiting period."'},
  {type:'q', text:'"Are you familiar with Living Benefits?"'},
  {type:'s', text:'"If you get cancer, heart attack, stroke — you can use this money while you\'re LIVING. Tax-free."'},
  {type:'s', text:'"70% of people who reach 65 will have a qualifying event. This isn\'t just a death benefit."'},
  {type:'group', text:'Numbers'},
  {type:'s', text:'"100% — [FACE VALUE] — [PREMIUM]/mo"'},
  {type:'s', text:'"75%  — [FACE VALUE] — [PREMIUM]/mo"'},
  {type:'s', text:'"50%  — [FACE VALUE] — [PREMIUM]/mo"'},
],
{g:[`"This sounds interesting"`,
    `Expand the emotional angle.\n\n"For someone in your exact situation — [BENEFICIARY]'s name, [DEBT], [EQUITY] — what this means in practice is she/he has time to make a plan. Not a crisis on day one." → Step 6.`,
    null],
 y:[`"Tell me more about Living Benefits"`,
    `Buying signal — go deep.\n\n"So let's say you have a heart attack — God forbid. You're in the hospital for a month, looking at $80,000 in bills. [CARRIER] lets you access a portion of your face value to pay that off, tax-free, while you're still alive." → Step 6.`,
    null],
 o:[`"How does it actually work"`,
    `Mechanism explanation.\n\n"The basic mechanics: you make a payment → portion goes to cost of insurance → if something happens, [CARRIER] pays [BENEFICIARY] within 7 days. The part that surprises people is the Living Benefits — it's not just a death policy." → Step 6.`,
    5],
 r:[`"Sounds expensive"`,
    `Lost them on value — the rapport foundation wasn't solid enough to hold the price.\n\n"You're right to push back on that. Let me back up for a second — I don't think I made this real enough for your specific situation. Tell me again: [restate their exact pain from Step 2]."\n\nRebuild the emotional case from Step 3 before you re-pitch.`,
    3],
 p:[`"I need to think about it"`,
    `Closed down during the pitch — they heard the words but weren't bought in.\n\n"Absolutely. Before you do — help me understand something. When you filled out that form, what was going on that made you want to look into this?"\n\nGet them back to their own WHY. Rebuild from rapport.`,
    3]},
{family:'assertive', cue:'Slow down. Every point lands heavier when you give it space. You know this cold.', avoid:"Don't rush to the numbers. Build certainty in the company before you quote anything."}],

[6,'Ask for the Order','Assume the sale — ask HOW, never IF',
[
  {type:'q', text:'"Do you need me to repeat any of those numbers?"'},
  {type:'s', text:'"The biggest thing we\'re doing today is seeing if we can get you approved."'},
  {type:'s', text:'"We can\'t make a final decision anyway — I still don\'t know if they\'d approve you."'},
  {type:'s', text:'"[CARRIER] will mail the policy out first thing tomorrow so you can review everything."'},
  {type:'q', text:'"Which of these three options makes the most sense for you month to month, and for [BENEFICIARY] when something happens?"'},
],
{g:[`"Okay, let's do it"`,
    `STOP — CEMENT IMMEDIATELY.\n\nDo NOT keep selling.\n\n"Perfect. Let me get you set up right now."\n\n→ Jump directly to Step 11 before any second thoughts emerge.`,
    null],
 y:[`"Sounds good but..."`,
    `Handle the 'but' directly.\n\n"Tell me what the 'but' is." → Listen fully.\n\n"I hear you. Here's the thing — [address the specific 'but']." → Step 7.`,
    7],
 o:[`"Let me think about it"`,
    `Surface the real objection.\n\n"Of course. What specifically are you thinking about? Because if there's something I haven't addressed, I'd rather handle it now." → Step 7.`,
    7],
 r:[`"I'm not ready for this"`,
    `Loop to deflect.\n\n"Completely understand. What would need to be different for this to make sense for you right now?" → Listen → Step 7.`,
    7],
 p:[`"Absolutely not"`,
    `Total shutdown at the close means rapport broke somewhere before the pitch.\n\n"I hear you — and I'm not going to push. Before I let you go, can I just ask: what would have needed to be different about this conversation for it to feel right?"\n\nListen. Whatever they say is the thing you missed. Go back to Step 3 and rebuild from there.`,
    3]},
{family:'assertive', cue:"You already know they're saying yes. This is just logistics.", avoid:`Don't say "does that sound good?" — that's a question. State, don't ask. Then hold the silence.`}],

[7,'Deflect Rejection','Acknowledge fully — pivot to one undeniable truth',
[
  {type:'s', text:'"I totally understand."'},
  {type:'s', text:'"I\'m not asking you to make any final decision right now."'},
  {type:'q', text:'"What specifically do you want to think about?"'},

// ── State ──
let cur=1, sel={}, done=new Set(), openSet=new Set([1]), log=[], t0=Date.now();

// ── Render ──
function render(){
  document.getElementById('slist').innerHTML=S.map(renderStep).join('');
  document.getElementById('hstep').textContent=cur+' / 12';
  document.getElementById('prog-bar').style.width=(cur/12*100)+'%';
  renderLog();
}

function renderStep([id,name,sub,items,resp,tone]){
  const isCur=cur===id, isDone=done.has(id), isOpen=openSet.has(id);
  const selKey=sel[id];
  const tm=TM[tone.family];
  const tc=tm.color;

  // dots
  const dots=CKS.map(k=>`<div class="dot${selKey===k?' hit':''}" style="background:${CM[k].bc};"></div>`).join('');

  // color buttons
  const cbtnRow=CKS.map(k=>{
    const c=CM[k];
    const [word]=resp[k];
    const isSel=selKey===k;
    return `<button class="cbtn${isSel?' sel':''}" onclick="pickColor(${id},'${k}')"
      style="background:${c.bg};color:${c.cl};${isSel?'border-color:'+c.bc:''}">
      <span class="clabel">${c.l}</span>
      <span class="cword">${word}</span>
    </button>`;
  }).join('');

  // tonality block
  const toneHtml=`<div class="tblock" style="border-left-color:${tc};">
    <div class="tblock-primary" style="color:${tc};">${tm.label}</div>
    <div class="tblock-cue">${tone.cue}</div>
    <div class="tblock-avoid">${tone.avoid}</div>
  </div>`;

  // items list
  const itemsHtml=`<div class="items-list">${items.map(it=>{
    if(it.type==='group') return `<div class="igroup">${it.text}</div>`;
    return `<div class="item item-${it.type}">${it.text}</div>`;
  }).join('')}</div>`;

  // handler
  let handlerHtml='';
  if(selKey){
    const c=CM[selKey];
    const [,handler,loopTo]=resp[selKey];
    let acts='';
    if(loopTo!==null){
      acts+=`<button class="abtn loop" onclick="jumpTo(${loopTo})">↩ Loop back to Step ${loopTo}: ${S[loopTo-1][1]}</button>`;
    }
    if(loopTo===null&&id<12){
      acts+=`<button class="abtn adv" onclick="advance(${id})">→ Continue to Step ${id+1}: ${S[id][1]}</button>`;
    }
    if(id===12&&loopTo===null){
      acts+=`<button class="abtn done-btn" onclick="newSession()">✓ Call complete — start new session</button>`;
    }
    handlerHtml=`<div class="hbox" style="border-left-color:${c.bc};">
      <div class="htext">${handler.replace(/\n/g,'<br>')}</div>
      <div class="hacts">${acts}</div>
    </div>`;
  }

  // nav
  const navHtml=`<div class="nbar">
    ${id>1?`<button class="nbtn" onclick="jumpTo(${id-1})">← Back</button>`:'<span></span>'}
    <span style="font-size:11px;color:var(--muted);margin:0 auto;">Step ${id} of 12</span>
    <button class="nbtn prime" onclick="advance(${id})">${id<12?'Continue →':'Complete Call ✓'}</button>
  </div>`;

  const cls=['sc',isCur?'cur':'',isDone?'done':'',isOpen?'open':''].filter(Boolean).join(' ');
  const numDisp=isDone?'✓':String(id).padStart(2,'0');

  return `<div class="${cls}" id="sc${id}" style="border-left-color:${tc};">
    <div class="sh" onclick="toggle(${id})">
      <span class="snum">${numDisp}</span>
      <div class="smeta">
        <div class="sname">${name}</div>
        <div class="smeta-bottom">
          <span class="ssub">${sub}</span>
          <span class="stone-tag" style="color:${tc};">${tm.label}</span>
        </div>
      </div>
      <div class="sdots">${dots}</div>
      <span class="chev">▾</span>
    </div>
    <div class="sbody">
      ${toneHtml}
      <div class="slabel" style="margin-bottom:8px;">Prospect Response — Click their reaction</div>
      <div class="crow">${cbtnRow}</div>
      ${handlerHtml}
      <div class="slabel" style="margin:16px 0 8px;">Questions & Statements</div>
      ${itemsHtml}
      ${navHtml}
    </div>
  </div>`;
}

function renderLog(){
  const wrap=document.getElementById('log-wrap');
  const list=document.getElementById('log-list');
  if(log.length===0){wrap.style.display='none';return;}
  wrap.style.display='block';
  list.innerHTML=log.map(e=>{
    const c=CM[e.ck];
    return `<div class="log-item">
      <span class="log-step">${String(e.step).padStart(2,'0')}</span>
      <div class="log-color" style="background:${c.bc};"></div>
      <span class="log-name">${S[e.step-1][1]}</span>
      <span style="font-size:11px;color:${c.cl};">${c.l}</span>
      <span class="log-outcome">${e.word}</span>
    </div>`;
  }).join('');
}

// ── Actions ──
function toggle(id){
  if(openSet.has(id)){
    openSet.delete(id);
  } else {
    openSet.clear();
    openSet.add(id);
  }
  render();
}

function pickColor(id,ck){
  const prev=sel[id];
  if(prev===ck){sel[id]=undefined;render();return;}
  sel[id]=ck;
  const [word,handler,loopTo]=S[id-1][4][ck];
  if(loopTo===null&&id<12) done.add(id);
  if(!log.find(e=>e.step===id&&e.ck===ck)){
    log.push({step:id,ck,word});
  }
  openSet.add(id);
  render();
  setTimeout(()=>{
    const el=document.getElementById('sc'+id);
    const hb=el.querySelector('.hbox');
    if(hb) hb.scrollIntoView({behavior:'smooth',block:'nearest'});
  },60);
}

function advance(id){
  done.add(id);
  if(id<12){
    cur=id+1;
    sel[cur]=undefined;
    openSet.clear();
    openSet.add(cur);
    render();
    setTimeout(()=>{
      const el=document.getElementById('sc'+cur);
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    },60);
  } else {
    cur=12;
    openSet.clear();
    render();
  }
}

function jumpTo(id){
  cur=id;
  sel[id]=undefined;
  openSet.clear();
  openSet.add(id);
  render();
  setTimeout(()=>{
    const el=document.getElementById('sc'+id);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}

function newSession(){
  cur=1;sel={};done=new Set();openSet.clear();openSet.add(1);log=[];t0=Date.now();
  render();
  setTimeout(()=>{
    const el=document.getElementById('sc1');
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}

// ── Timer ──
setInterval(()=>{
  const el=document.getElementById('htimer');
  if(!el) return;
  const s=Math.floor((Date.now()-t0)/1000);
  el.textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+(s%60);
},1000);

render();
</script>
